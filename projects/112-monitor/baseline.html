            <script type="text/javascript">
                function validateNumber(evt) {
                    var theEvent = evt || window.event;
                    var key = theEvent.keyCode || theEvent.which;
                    key = String.fromCharCode(key);
                    var regex = /[0-9]/i;
                    if (!regex.test(key)) {
                        theEvent.returnValue = false;
                        if (theEvent.preventDefault)
                            theEvent.preventDefault();
                    }
                }

                function submitWithEnter(event) {
                    if (event.keyCode === 13) {
                        document.getElementById('checkBtn').click();
                        return false;
                    }
                }

                function refreshCaptcha() {
                    document.getElementById('imgCaptchaId').src = 'captcha.png?' + Math.random();
                    document.getElementById('cptc').value = '';
                    return false;
                }
            </script>

            <script>
                window.addEventListener("load", function () {
                    var browserName = "";
                    var browserMessage = "";

                    // FIREFOX
                    if (navigator.userAgent.indexOf("Firefox") !== -1) {
                        browserName = "Mozilla Firefox";
                    }
                    // INTERNET EXPLORER
                    else if (navigator.userAgent.indexOf("MSIE") !== -1) {
                        browserName = "Internet Explorer";
                    }
                    // EDGE
                    else if (navigator.userAgent.indexOf("Edge") !== -1 || navigator.userAgent.indexOf("Edg") !== -1) {
                        browserName = "Edge";
                    }
                    // CHROME
                    else if (navigator.userAgent.indexOf("Chrome") !== -1) {
                        browserName = "Google Chrome";
                    }
                    // SAFARI
                    else if (navigator.userAgent.indexOf("Safari") !== -1) {
                        browserName = "Safari";
                    }
                    // OPERA
                    else if (navigator.userAgent.indexOf("Opera") !== -1) {
                        browserName = "Opera";
                    }
                    // TRIDENT (IE11)
                    else if (navigator.userAgent.indexOf("Trident") !== -1) {
                        browserName = "IE";
                    }
                    // OTHERS
                    else {
                        browserName = "Others";
                    }

                    if (browserName.localeCompare("IE") === 0) {
                        browserMessage = "Uygulama Google Chrome ile uyumludur. Google Chrome kullanmayi deneyiniz.";
                        printBrowserMessage(browserMessage);
                    }
                });

                function printBrowserMessage(_browserMessage) {
                    document.getElementById('browserMessage').innerHTML = _browserMessage;
                }
            </script></body>
